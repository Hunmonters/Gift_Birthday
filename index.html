<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday 🎂</title>
    <link
      rel="icon"
      type="image/png"
      href="https://i.postimg.cc/qvjz8QFW/Logo.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="password-screen" class="password-screen">
      <div class="password-content">
        <img
          src="https://i.pinimg.com/originals/8c/d0/61/8cd061f25177d38be9719798c5127a9f.gif"
          alt="Cute GIF"
          class="pass-gif"
        />
        <div class="pass-right-side">
          <p class="pass-label">Nhập Password</p>
          <div class="pass-input-wrapper">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="keypad">
            <button class="key" data-value="1">1</button>
            <button class="key" data-value="2">2</button>
            <button class="key" data-value="3">3</button>
            <button class="key" data-value="4">4</button>
            <button class="key" data-value="5">5</button>
            <button class="key" data-value="6">6</button>
            <button class="key" data-value="7">7</button>
            <button class="key" data-value="8">8</button>
            <button class="key" data-value="9">9</button>
            <button class="key empty"></button>
            <button class="key" data-value="0">0</button>
            <button class="key delete" id="key-del">⌫</button>
          </div>
        </div>
      </div>
    </div>

    <div id="main-experience" style="display: none">
      <div class="floating-elements" id="floating-elements"></div>

      <div class="container">
        <div class="cake-container">
          <img
            src="asset/candle.png"
            alt="Candle"
            class="candle-img"
            id="candle-img"
          />
          <img
            src="asset/cake.png"
            alt="Cake"
            class="cake-img"
            id="cake-clickable"
            style="cursor: pointer"
          />
        </div>
        <p class="instruction" id="instruction-text">
          Nhấn vào bánh để thắp nến
        </p>
      </div>

    </div>

    <audio id="bg-music" loop></audio>
    <script>
      // Load nhạc qua Fetch để tránh IDM tự động tải về
      fetch("asset/sound/nhac.mp3")
        .then(res => res.blob())
        .then(blob => {
          document.getElementById("bg-music").src = URL.createObjectURL(blob);
        });
    </script>
    <audio id="pop-sound" src="asset/sound/pop.mp3"></audio>
    <audio id="candle-sound" src="asset/sound/candle.mp3"></audio>

    <script src="script.js"></script>
  </body>
</html>
